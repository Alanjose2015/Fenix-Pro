<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FÉNIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        /* Agrega estilo aquí */
        .barra-sup {
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
            padding: .7rem 1rem;
            display: flex;
            align-items: center;
            gap: .8rem;
            position: relative;
        }
        
        .barra-sup button {
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .barra-sup button:hover {
            background: #eee;
            color: #e62e00;
        }
        
        .espacio {
            flex: 1;
        }
        
        .contenido {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem;
            overflow-y: auto;
        }
        
        .marca {
            display: flex;
            align-items: center;
            gap: .5rem;
            margin-bottom: 1.8rem;
        }
        
        .ico-fuego {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #e62e00, #ff6b00, #ffcc00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: llama 1.3s infinite alternate;
        }
        
        .txt-fenix {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            background: linear-gradient(90deg, #e62e00, #ff6b00, #ffcc00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: brillar 1.6s infinite alternate, flotar 2.2s infinite;
        }
        
        @keyframes brillar {
            0% { filter: brightness(1) }
            100% { filter: brightness(1.4) drop-shadow(0 0 6px rgba(255, 107, 0, .6)) }
        }
        
        @keyframes flotar {
            0% { transform: translateY(0) }
            100% { transform: translateY(-3px) }
        }
        
        @keyframes llama {
            0% { transform: scale(1) rotate(-3deg) }
            100% { transform: scale(1.15) rotate(3deg) }
        }
        
        .buscador {
            width: 100%;
            max-width: 620px;
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 2.5rem;
            padding: .8rem 1.2rem;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
        }
        
        .buscador:focus-within {
            box-shadow: 0 3px 12px rgba(230, 46, 0, .2);
            border-color: #ff6b00;
        }
        
        .buscador i {
            color: #ff6b00;
            margin-right: .6rem;
        }
        
        .buscador input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1rem;
            color: #333;
            background: transparent;
        }
        
        .marcadores {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(105px, 1fr));
            gap: 1rem;
            width: 100%;
            max-width: 680px;
            margin: 1.8rem auto;
        }
        
        .marcador {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: .3rem;
            padding: .9rem;
            border-radius: .8rem;
            border: 1px solid #e5e5e5;
            background: #fff;
            box-shadow: 0 2px 6px rgba(0, 0, 0, .05);
            cursor: pointer;
        }
        
        .marcador:hover {
            transform: translateY(-2px);
            border-color: #ff6b00;
            box-shadow: 0 4px 10px rgba(230, 107, 0, .15);
            color: #e62e00;
        }
        
        .marcador i {
            font-size: 1.3rem;
        }
        
        .marcador span {
            font-size: .85rem;
            text-align: center;
        }
        
        .btn-agregar {
            border-style: dashed;
            border-color: #aaa;
            color: #666;
        }
        
        .menu-puntos {
            position: relative;
        }
        
        .menu-desp {
            position: absolute;
            top: 2.5rem;
            right: .8rem;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: .5rem;
            box-shadow: 0 3px 12px rgba(0, 0, 0, .15);
            min-width: 180px;
            display: none;
            z-index: 999;
        }
        
        .menu-desp.mostrar {
            display: block;
        }
        
        .menu-desp button {
            width: 100%;
            text-align: left;
            padding: .7rem 1rem;
            border: none;
            background: transparent;
            color: #333;
            display: flex;
            align-items: center;
            gap: .6rem;
            justify-content: flex-start;
        }
        
        .menu-desp button:hover {
            background: #f1f3f4;
            color: #e62e00;
        }
        
        .zona-navegacion {
            flex: 1;
            width: 100%;
            display: none;
            border-top: 1px solid #ddd;
        }
        
        .zona-navegacion iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .aviso {
            display: none;
            color: #e62e00;
            text-align: center;
            margin-top: .8rem;
            font-size: .9rem;
        }
        
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .modal.mostrar {
            display: flex;
        }
        
        .modal-caja {
            background: #fff;
            padding: 1.3rem;
            border-radius: .75rem;
            width: 88%;
            max-width: 320px;
        }
        
        .modal-caja input {
            width: 100%;
            padding: .7rem;
            margin: .5rem 0;
            border: 1px solid #ddd;
            border-radius: .4rem;
            outline: none;
        }
        
        .modal-caja input:focus {
            border-color: #ff6b00;
        }
        
        .modal-botones {
            display: flex;
            justify-content: flex-end;
            gap: .7rem;
            margin-top: .9rem;
        }
        
        .btn-quitar {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #eee;
            color: #666;
            font-size: 12px;
            display: none;
            align-items: center;
            justify-content: center;
            border: none;
        }
    </style>
</head>
<body>
    <div class="barra-sup">
        <button id="atras"><i class="fa fa-arrow-left"></i></button>
        <button id="adelante"><i class="fa fa-arrow-right"></i></button>
        <button id="recargar"><i class="fa fa-refresh"></i></button>
        <button id="inicio"><i class="fa fa-home"></i></button>
        <div class="espacio"></div>
        <button id="btn-estrella"><i class="fa fa-star-o"></i></button>
        <div class="menu-puntos">
            <button id="btn-menu"><i class="fa fa-ellipsis-v"></i></button>
            <div class="menu-desp" id="menu-desp">
                <button><i class="fa fa-plus-square-o"></i>Nueva pestaña</button>
                <button><i class="fa fa-history"></i>Historial</button>
                <button><i class="fa fa-cog"></i>Configuración</button>
                <button id="borrar-todos"><i class="fa fa-trash-o"></i>Borrar marcadores</button>
                <button id="acerca-de"><i class="fa fa-info-circle"></i>Acerca de FÉNIX</button>
            </div>
        </div>
    </div>
    <div id="pantalla-inicio" class="contenido">
        <div class="marca">
            <i class="fa fa-fire ico-fuego"></i>
            <span class="txt-fenix">FÉNIX</span>
        </div>
        <div class="buscador">
            <i class="fa fa-search"></i>
            <input id="entrada-buscar" type="text" placeholder="Buscar o escribir dirección web...">
        </div>
        <div class="marcadores" id="contenedor-marcadores"></div>
        <div id="aviso-texto" class="aviso"></div>
    </div>
    <div class="zona-navegacion" id="zona-navegacion">
        <iframe id="vista-web" src=""></iframe>
    </div>
    <div class="modal" id="modal-agregar">
        <div class="modal-caja">
            <h4 style="margin: 0 0 .8rem">Agregar marcador</h4>
            <input id="nombre-sitio" placeholder="Nombre del sitio">
            <input id="url-sitio" placeholder="Ej: https://facebook.com">
            <div class="modal-botones">
                <button style="padding: .55rem 1rem; border: none; border-radius: .35rem; background: #eee; color: #333; cursor: pointer" id="btn-cerrar">Cancelar</button>
                <button style="padding: .55rem 1rem; border: none; border-radius: .35rem; background: #e62e00; color: #fff; cursor: pointer" id="btn-guardar">Guardar</button>
            </div>
        </div>
    </div>
    <script>
        const $ = id => document.getElementById(id);
        const g = s => document.querySelector(s);
        const ga = s => document.querySelectorAll(s);

        const atras = $('#atras');
        const adelante = $('#adelante');
        const recargar = $('#recargar');
        const inicio = $('#inicio');
        const btnMenu = $('#btn-menu');
        const menuDesp = $('#menu-desp');
        const entrada = $('#entrada-buscar');
        const contenedorMarc = $('#contenedor-marcadores');
        const btnEstrella = $('#btn-estrella');
        const modal = $('#modal-agregar');
        const nomSitio = $('#nombre-sitio');
        const urlSitio = $('#url-sitio');
        const btnCerrar = $('#btn-cerrar');
        const btnGuardar = $('#btn-guardar');
        const pantallaInicio = $('#pantalla-inicio');
        const zonaNav = $('#zona-navegacion');
        const vistaWeb = $('#vista-web');
        const aviso = $('#aviso-texto');
        const borrarTodos = $('#borrar-todos');
        const acerca = $('#acerca-de');

        let marcadores = JSON.parse(localStorage.getItem('fenixMarcadores') || '[{"nombre": "Wikipedia", "url": "https://es.wikipedia.org"}, {"nombre": "Facebook", "url": "https://www.facebook.com"}, {"nombre": "TikTok", "url": "https://www.tiktok.com"}, {"nombre": "Instagram", "url": "https://www.instagram.com"}, {"nombre": "X / Twitter", "url": "https://www.x.com"}, {"nombre": "YouTube", "url": "https://www.youtube.com"}, {"nombre": "Mapas", "url": "https://www.google.com/maps"}, {"nombre": "RAE", "url": "https://www.rae.es"}, {"nombre": "BBC Noticias", "url": "https://www.bbc.com/mundo"}, {"nombre": "LinkedIn", "url": "https://www.linkedin.com"}]');

        function guardar() {
            localStorage.setItem('fenixMarcadores', JSON.stringify(marcadores));
        }

        function dibujar() {
            contenedorMarc.innerHTML = '';
            marcadores.forEach((m, i) => {
                const el = document.createElement('div');
                el.className = 'marcador';
                el.dataset.url = m.url;
                el.innerHTML = `<i class="fa fa-bookmark"></i><span>${m.nombre}</span><button class="btn-quitar" data-pos="${i}">×</button>`;
                contenedorMarc.appendChild(el);
            });
            const agr = document.createElement('div');
            agr.className = 'marcador btn-agregar';
            agr.id = 'boton-agregar';
            agr.innerHTML = `<i class="fa fa-plus"></i><span>Agregar</span>`;
            contenedorMarc.appendChild(agr);
            g('#boton-agregar').addEventListener('click', () => modal.classList.add('mostrar'));
            ga('.marcador:not(.btn-agregar)').forEach(m => {
                m.addEventListener('click', e => {
                    if (e.target.classList.contains('btn-quitar')) {
                        const idx = parseInt(e.target.dataset.pos);
                        marcadores.splice(idx, 1);
                        guardar();
                        dibujar();
                        return;
                    }
                    navegar(m.dataset.url);
                });
            });
            ga('.btn-quitar').forEach(x => x.addEventListener('click', e => {
                e.stopPropagation();
                const idx = parseInt(e.target.dataset.pos);
                marcadores.splice(idx, 1);
                guardar();
                dibujar();
            }));
        }

        function arreglarUrl(u) {
            u = u.trim();
            if (!u) return '';
            if (!/^https?:\/\//i.test(u)) {
                if (/\./.test(u)) return 'https://' + u;
                else return 'https://www.google.com/search?q=' + encodeURIComponent(u);
            }
            return u;
        }

        function navegar(dest) {
            const dir = dest ? arreglarUrl(dest) : arreglarUrl(entrada.value);
            if (!dir) {
                aviso.textContent = '⚠️ Escribe una dirección válida';
                avizo.style.display = 'block';
                return;
            }
            aviso.style.display = 'none';
            vistaWeb.src = dir;
            pantallaInicio.style.display = 'none';
            zonaNav.style.display = 'flex';
        }

        function volver() {
            vistaWeb.src = '';
            zonaNav.style.display = 'none';
            pantallaInicio.style.display = 'flex';
            aviso.style.display = 'none';
        }

        btnMenu.addEventListener('click', e => {
            e.stopPropagation();
            menuDesp.classList.toggle('mostrar');
        });
        document.addEventListener('click', () => menuDesp.classList.remove('mostrar'));
        entrada.addEventListener('keydown', e => e.key === 'Enter' && navegar());
        atras.addEventListener('click', () => history.back());
        adelante.addEventListener('click', () => history.forward());
        recargar.addEventListener('click', () => {
            if (vistaWeb.src) vistaWeb.src = vistaWeb.src;
        });
        inicio.addEventListener('click', volver);
        btnEstrella.addEventListener('click', () => modal.classList.add('mostrar'));
        btnCerrar.addEventListener('click', () => modal.classList.remove('mostrar'));
        btnGuardar.addEventListener('click', () => {
            const n = nomSitio.value.trim();
            const u = arreglarUrl(urlSitio.value.trim());
            if (n && u) {
                marcadores.push({ nombre: n, url: u });
                guardar();
                dibujar();
                modal.classList.remove('mostrar');
                nomSitio.value = '';
                urlSitio.value = '';
            } else {
                aviso.textContent = '⚠️ Completa nombre y dirección';
                avizo.style.display = 'block';
            }
        });
        vistaWeb.addEventListener('error', () => {
            aviso.textContent = '⚠️ Esta página no se puede mostrar aquí';
            avizo.style.display = 'block';
            volver();
        });
        borrarTodos.addEventListener('click', () => {
            if (confirm('¿Eliminar todos los marcadores?')) {
                marcadores = [];
                guardar();
                dibujar();
            }
        });
        acerca.addEventListener('click', () => alert('FÉNIX Navegador • Versión 1.0'));
        dibujar();
    </script>
</body>
    </html>
